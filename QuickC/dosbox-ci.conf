# dosbox-ci.conf — конфиг специально для headless запуска в GitHub Actions / CI
# Используется build_ci.sh для сборки эталонных QuickC .EXE через DOSBox.

[sdl]
fullscreen=false
fulldouble=false
windowresolution=original
output=surface
autolock=false
sensitivity=100

[dosbox]
machine=svga_et4000
memsize=32
captures=capture

[cpu]
core=normal
cputype=386
cycles=30000

[render]
aspect=false

[autoexec]
@echo off
echo [DOSBox CI] Mounting current directory as C:...
mount c .
c:
echo [DOSBox CI] Setting environment (LIB, INCLUDE, PATH)...
set LIB=c:\
set INCLUDE=c:\INCLUDE
set PATH=c:\;%PATH%
echo [DOSBox CI] Current drive and dir:
cd
echo [DOSBox CI] Changing to PROGRAMS and starting build...
cd PROGRAMS
call ..\build_dos.bat
echo [DOSBox CI] Build script finished. Exiting DOSBox...
exit
