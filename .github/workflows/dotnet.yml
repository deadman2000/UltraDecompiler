# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build (.NET on Linux)

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

  test:
    runs-on: ubuntu-latest
    name: Build QuickC examples (DOSBox-X) + test
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Build reference examples
      uses: joncloud/dos-build-action@v1
      with:
        programs: |
          QuickC:C:\QC
        run: |
          C:
          SET LIB=C:\QC
          SET INCLUDE=C:\QC\INCLUDE
          SET PATH=C:\QC;%PATH%
          CD \QC\PROGRAMS
          DIR
          DIR ..
          CALL ..\build_dos.bat
        conf: |
          [cpu]
          cycles=30000
          turbo=true

    - name: Show produced QuickC executables
      run: |
        echo "=== QuickC build artifacts in PROGRAMS ==="
        ls -l QuickC/PROGRAMS/*_?.EXE || true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal
