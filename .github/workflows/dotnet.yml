# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build (.NET on Linux)

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

  test:
    runs-on: ubuntu-latest
    name: Build QuickC examples (DOSBox) + test
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Install DOSBox
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y software-properties-common
        # Try to get newer dosbox-staging from official PPA
        sudo add-apt-repository -y ppa:dosbox-staging/stable || true
        sudo apt-get update -qq
        sudo apt-get install -y dosbox-staging || sudo apt-get install -y dosbox

        echo "=== Installed DOSBox ==="
        (dosbox-staging --version 2>/dev/null || dosbox --version 2>/dev/null || echo "no version info")
        (command -v dosbox-staging || command -v dosbox || echo "dosbox not found in PATH")

    - name: Build QuickC reference examples via DOSBox
      run: |
        chmod +x QuickC/build_ci.sh || true
        bash QuickC/build_ci.sh
        echo "=== QuickC build artifacts in PROGRAMS ==="
        ls -l QuickC/PROGRAMS/*_?.EXE || true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal
